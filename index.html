// Simulasi antrean
function simulasiAntrean(){
  const waktu=document.getElementById('simWaktu').value;
  const gender=document.getElementById('simGender').value;
  let base=30;
  if(waktu==='pagi')base+=20;
  if(waktu==='siang')base+=40;
  if(waktu==='sore')base+=60;
  if(waktu==='malam')base+=30;
  if(gender==='wanita')base+=30;
  const min=Math.max(15,base-15);
  const max=base+25;
  const result=Math.floor(Math.random()*(max-min)+min);
  document.getElementById('simResult').style.display='block';
  document.getElementById('simTimeValue').textContent=result;
  document.getElementById('simTimeUnit').textContent='menit estimasi';
  const tips=[];
  if(result>60)tips.push('Waktu antrean cukup lama. Bawa air minum dan bersabarlah.');
  if(waktu==='sore')tips.push('Waktu sore biasanya paling ramai. Pertimbangkan datang pagi.');
  if(gender==='wanita')tips.push('Wanita memiliki jadwal khusus, pastikan reservasi melalui aplikasi.');
  if(result<=30)tips.push('Waktu antrean relatif singkat. Manfaatkan dengan baik.');
  document.getElementById('simTip').textContent=tips.join(' ');
}

// Doa
function renderDoa(cat='Semua',query=''){
  const wrap=document.getElementById('doaList');
  let data=DOA_DATA;
  if(cat!=='Semua')data=data.filter(d=>d.cat===cat);
  if(query)data=data.filter(d=>d.title.toLowerCase().includes(query)||d.meaning.toLowerCase().includes(query)||d.cat.toLowerCase().includes(query));
  wrap.innerHTML=data.map(d=>`
    <div class="doa-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h4 style="color:var(--accent);font-size:1rem">${d.title}</h4>
        <div style="display:flex;gap:4px;align-items:center">
          <span class="doa-tag">${d.cat}</span>
          <button class="copy-btn" onclick="copyDoa(this,'${d.arabic.replace(/'/g,"\\'")}')">📋 Salin</button>
        </div>
      </div>
      <div class="doa-arabic">${d.arabic}</div>
      <div class="doa-latin">${d.latin}</div>
      <div class="doa-meaning">${d.meaning}</div>
    </div>
  `).join('')||'<div class="empty-state"><div class="empty-icon">🔍</div><p>Doa tidak ditemukan</p></div>';
}
function filterDoa(query){renderDoa('Semua',query.toLowerCase())}
function filterDoaCat(cat){
  document.querySelectorAll('#doaTabs .tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderDoa(cat);
}
function copyDoa(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ Disalin';
    setTimeout(()=>btn.textContent='📋 Salin',1500);
  });
}

// FAQ
function renderFAQ(query=''){
  const wrap=document.getElementById('faqList');
  let data=FAQ_DATA;
  if(query)data=data.filter(f=>f.q.toLowerCase().includes(query)||f.a.toLowerCase().includes(query));
  wrap.innerHTML=data.map((f,i)=>`
    <div class="faq-item">
      <div class="faq-q" onclick="toggleFAQ(this)">
        <span>${i+1}. ${f.q}</span>
        <span class="arrow">▼</span>
      </div>
      <div class="faq-a"><div class="faq-a-inner">${f.a}</div></div>
    </div>
  `).join('')||'<div class="empty-state"><div class="empty-icon">🔍</div><p>FAQ tidak ditemukan</p></div>';
}
function toggleFAQ(el){
  const isOpen=el.classList.contains('open');
  el.classList.toggle('open');
  const a=el.nextElementSibling;
  if(isOpen){a.style.maxHeight='0';}
  else{a.style.maxHeight=a.scrollHeight+'px';}
}
function filterFAQ(query){renderFAQ(query.toLowerCase())}

// Checklist
function renderChecklist(){
  const wrap=document.getElementById('checklistContent');
  let html='';
  for(const[cat,items] of Object.entries(CHECKLIST_DATA)){
    html+=`<div class="card">
      <div class="card-title">${cat}</div>
      <div style="margin-top:8px">${items.map((item,i)=>{
        const key=cat+'_'+i;
        const checked=state.checklistCheck.includes(key);
        return `<div class="checklist-item ${checked?'checked':''}">
          <input type="checkbox" ${checked?'checked':''} onchange="toggleChecklist('${key.replace(/'/g,"\\'")}',this)">
          <span class="cl-text">${item}</span>
        </div>`;
      }).join('')}</div>
    </div>`;
  }
  wrap.innerHTML=html;
  updateChecklistProgress();
}
function toggleChecklist(key,el){
  if(el.checked){
    if(!state.checklistCheck.includes(key))state.checklistCheck.push(key);
  }else{
    state.checklistCheck=state.checklistCheck.filter(k=>k!==key);
  }
  saveState();
  el.closest('.checklist-item').classList.toggle('checked',el.checked);
  updateChecklistProgress();
}
function updateChecklistProgress(){
  const total=Object.values(CHECKLIST_DATA).flat().length;
  const pct=Math.round((state.checklistCheck.length/total)*100);
  document.getElementById('checklistBar').style.width=pct+'%';
  document.getElementById('checklistPct').textContent=pct+'%';
}

// Catatan
function renderNotes(){
  const wrap=document.getElementById('notesList');
  if(state.catatan.length===0){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>Belum ada catatan. Tambahkan catatan pertama Anda!</p></div>';
    return;
  }
  wrap.innerHTML=state.catatan.map((n,i)=>`
    <div class="note-card">
      <div class="note-content">
        <div class="note-title">${n.title}</div>
        <div class="note-body">${n.body}</div>
        <div class="note-date">${n.date}</div>
      </div>
      <div class="note-actions">
        <button class="note-btn" onclick="editNote(${i})" title="Edit">✏️</button>
        <button class="note-btn" onclick="deleteNote(${i})" title="Hapus">🗑️</button>
      </div>
    </div>
  `).join('');
}
function addNote(){
  const title=document.getElementById('noteTitle').value.trim();
  const body=document.getElementById('noteBody').value.trim();
  if(!title||!body){showToast('Judul dan isi catatan harus diisi','error');return;}
  state.catatan.unshift({title,body,date:new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})});
  saveState();
  document.getElementById('noteTitle').value='';
  document.getElementById('noteBody').value='';
  renderNotes();
  showToast('Catatan berhasil disimpan!');
}
function editNote(idx){
  const n=state.catatan[idx];
  document.getElementById('noteTitle').value=n.title;
  document.getElementById('noteBody').value=n.body;
  state.catatan.splice(idx,1);
  saveState();
  renderNotes();
  showToast('Catatan dimuat untuk diedit','info');
  window.scrollTo({top:0,behavior:'smooth'});
}
function deleteNote(idx){
  if(!confirm('Hapus catatan ini?'))return;
  state.catatan.splice(idx,1);
  saveState();
  renderNotes();
  showToast('Catatan dihapus');
}

function simulateEmergency(){

// Export/Import
function exportData(){
  const data={
    dokumenStatus:state.dokumenStatus,
    perlengkapanCheck:state.perlengkapanCheck,
    checklistCheck:state.checklistCheck,
    catatan:state.catatan,
    bookmarks:state.bookmarks,
    visitedPages:state.visitedPages
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='umrah-data-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data berhasil diexport!');
}
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.dokumenStatus)state.dokumenStatus=data.dokumenStatus;
      if(data.perlengkapanCheck)state.perlengkapanCheck=data.perlengkapanCheck;
      if(data.checklistCheck)state.checklistCheck=data.checklistCheck;
      if(data.catatan)state.catatan=data.catatan;
      if(data.bookmarks)state.bookmarks=data.bookmarks;
      if(data.visitedPages)state.visitedPages=data.visitedPages;
      saveState();
      renderDokumen();
      renderPerlengkapan();
      renderChecklist();
      renderNotes();
      showToast('Data berhasil diimport!');
    }catch(err){
      showToast('File tidak valid','error');
    }
  };
  reader.readAsText(file);
}

// INITIALIZATION
// ============================================
function init(){
  // Set theme
  document.documentElement.setAttribute('data-theme',state.theme);
  
  // Build sidebar
  buildSidebar();
  
  // Build pages
  buildPages();
  
  // Render dynamic content
  renderDokumen();
  renderPerlengkapan('Pria');
  renderDoa();
  renderFAQ();
  renderChecklist();
  renderNotes();
  
  // Update progress
  updateGlobalProgress();
  updateBookmarkBtn();
  
  // Navigate to saved page or beranda
  navigateTo(state.currentPage||'beranda');
  
  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
    if(e.key==='Escape')closeSearch();
  });
}

// Run
init();
</script>
