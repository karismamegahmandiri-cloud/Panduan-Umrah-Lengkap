<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan Lengkap Umrah — Ensiklopedia Digital</title>
<style>
/* ============================================
   CSS RESET & VARIABLES
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F8F5F0;--bg2:#EFE9E1;--card:#FFFFFF;--text:#1A1512;--text2:#6B5E52;
--accent:#1B4332;--accent2:#2D6A4F;--accent3:#40916C;--terracotta:#A0522D;
--gold:#B8860B;--border:#E0D8CF;--sidebar:#1B4332;--sidebar-text:#E8E0D6;
--sidebar-hover:#2D6A4F;--shadow:0 2px 12px rgba(27,67,50,0.08);
--shadow2:0 8px 32px rgba(27,67,50,0.12);--radius:12px;--radius-sm:8px;
--transition:0.3s cubic-bezier(0.4,0,0.2,1);
--font-heading:'Playfair Display',Georgia,'Times New Roman',serif;
--font-body:'Source Sans 3','Segoe UI',system-ui,sans-serif;
--sidebar-w:280px;
}
[data-theme="dark"]{
--bg:#121010;--bg2:#1E1A17;--card:#252220;--text:#F0EBE5;--text2:#A89E94;
--accent:#2D6A4F;--accent2:#40916C;--accent3:#52B788;--terracotta:#C87941;
--gold:#DAA520;--border:#3A3530;--sidebar:#0D1B14;--sidebar-text:#D0C8BE;
--sidebar-hover:#1B4332;--shadow:0 2px 12px rgba(0,0,0,0.3);
--shadow2:0 8px 32px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);
line-height:1.7;overflow-x:hidden;transition:background var(--transition),color var(--transition)}
h1,h2,h3,h4,h5{font-family:var(--font-heading);font-weight:700;line-height:1.3}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
input,textarea,select{font-family:var(--font-body);font-size:0.95rem}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:3px}

/* ============================================
   SIDEBAR
   ============================================ */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
background:var(--sidebar);color:var(--sidebar-text);z-index:1000;
display:flex;flex-direction:column;transition:transform var(--transition);
overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;align-items:center;gap:12px;flex-shrink:0}
.sidebar-logo{width:40px;height:40px;background:var(--accent3);border-radius:10px;
display:flex;align-items:center;justify-content:center;font-size:20px;
font-weight:800;color:#fff;font-family:var(--font-heading)}
.sidebar-brand{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:#fff}
.sidebar-brand small{display:block;font-size:0.65rem;font-weight:400;
opacity:0.7;letter-spacing:1px;text-transform:uppercase}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;
font-size:0.85rem;color:var(--sidebar-text);cursor:pointer;
transition:all var(--transition);border-left:3px solid transparent;
position:relative}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--sidebar-hover);color:#fff;
border-left-color:var(--accent3);font-weight:600}
.nav-icon{width:20px;text-align:center;font-size:1rem;flex-shrink:0}
.nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{margin-left:auto;background:var(--terracotta);color:#fff;
font-size:0.65rem;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1);
flex-shrink:0}
.progress-bar-mini{height:4px;background:rgba(255,255,255,0.15);border-radius:2px;
overflow:hidden;margin-top:6px}
.progress-bar-mini span{display:block;height:100%;background:var(--accent3);
border-radius:2px;transition:width 0.5s ease}
.progress-text{font-size:0.7rem;opacity:0.7;margin-top:4px}

/* ============================================
   MOBILE OVERLAY & HAMBURGER
   ============================================ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);
z-index:999;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.sidebar-overlay.show{opacity:1;pointer-events:all}
.hamburger{position:fixed;top:12px;left:12px;z-index:1001;
width:42px;height:42px;background:var(--accent);color:#fff;
border-radius:10px;display:none;align-items:center;justify-content:center;
font-size:1.3rem;box-shadow:var(--shadow2)}
@media(max-width:1024px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.hamburger{display:flex}
.main{margin-left:0!important}
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main{margin-left:var(--sidebar-w);min-height:100vh;transition:margin var(--transition)}
.page{display:none;padding:32px 40px 80px;max-width:1100px;animation:fadeUp 0.4s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ============================================
   HERO
   ============================================ */
.hero{position:relative;background:linear-gradient(135deg,var(--accent) 0%,#0D2818 100%);
color:#fff;border-radius:var(--radius);padding:56px 48px;overflow:hidden;margin-bottom:32px}
.hero::before{content:'';position:absolute;inset:0;
background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
z-index:0}
.hero-content{position:relative;z-index:1}
.hero h1{font-size:2.8rem;margin-bottom:12px;letter-spacing:-0.5px}
.hero p{font-size:1.15rem;opacity:0.85;max-width:600px;line-height:1.8}
.hero-badge{display:inline-block;background:rgba(255,255,255,0.15);
backdrop-filter:blur(4px);padding:6px 16px;border-radius:20px;
font-size:0.8rem;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.hero-geo{position:absolute;right:-20px;bottom:-30px;opacity:0.06;
font-size:280px;font-family:var(--font-heading);line-height:1;z-index:0}

/* ============================================
   STATS GRID
   ============================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:24px;text-align:center;transition:all var(--transition);position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow2)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
background:linear-gradient(90deg,var(--accent),var(--accent3))}
.stat-icon{font-size:2rem;margin-bottom:8px}
.stat-number{font-family:var(--font-heading);font-size:2.2rem;font-weight:800;
color:var(--accent);line-height:1}
.stat-label{font-size:0.8rem;color:var(--text2);margin-top:4px;text-transform:uppercase;
letter-spacing:0.5px}

/* ============================================
   TIMELINE
   ============================================ */
.timeline{display:flex;align-items:center;flex-wrap:wrap;gap:4px;
padding:24px;background:var(--card);border:1px solid var(--border);
border-radius:var(--radius);margin-bottom:32px}
.timeline-step{display:flex;align-items:center;gap:6px;background:var(--bg);
padding:8px 14px;border-radius:var(--radius-sm);font-size:0.82rem;
font-weight:600;white-space:nowrap;cursor:pointer;transition:all var(--transition)}
.timeline-step:hover{background:var(--accent);color:#fff}
.timeline-step.visited{background:var(--accent3);color:#fff}
.timeline-arrow{color:var(--text2);font-size:0.7rem;flex-shrink:0}

/* ============================================
   CARDS & SECTION STYLES
   ============================================ */
.section-title{font-size:1.8rem;margin-bottom:8px;color:var(--accent)}
.section-subtitle{color:var(--text2);margin-bottom:24px;font-size:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:24px;margin-bottom:16px;transition:all var(--transition)}
.card:hover{box-shadow:var(--shadow)}
.card-title{font-size:1.2rem;margin-bottom:12px;color:var(--accent);
display:flex;align-items:center;gap:8px}
.card p{color:var(--text2);line-height:1.8}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.72rem;
font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.badge-green{background:#d4edda;color:#155724}
.badge-red{background:#f8d7da;color:#721c24}
.badge-gold{background:#fff3cd;color:#856404}
.badge-blue{background:#d1ecf1;color:#0c5460}
[data-theme="dark"] .badge-green{background:#1B4332;color:#52B788}
[data-theme="dark"] .badge-red{background:#3D1C1C;color:#F87171}
[data-theme="dark"] .badge-gold{background:#3D3017;color:#DAA520}
[data-theme="dark"] .badge-blue{background:#1A3338;color:#67B8D6}
.highlight-box{background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#fff;border-radius:var(--radius);padding:24px;margin-bottom:16px}
.highlight-box h3{margin-bottom:8px}
.highlight-box p{opacity:0.9;line-height:1.8}
.icon-circle{width:44px;height:44px;border-radius:50%;background:var(--bg2);
display:flex;align-items:center;justify-content:center;font-size:1.3rem;
flex-shrink:0}

/* ============================================
   ACCORDION
   ============================================ */
.accordion{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
margin-bottom:16px}
.accordion-item{border-bottom:1px solid var(--border)}
.accordion-item:last-child{border-bottom:none}
.accordion-header{padding:16px 20px;display:flex;align-items:center;
justify-content:space-between;cursor:pointer;font-weight:600;
background:var(--card);transition:background var(--transition)}
.accordion-header:hover{background:var(--bg2)}
.accordion-header .arrow{transition:transform var(--transition);font-size:0.8rem}
.accordion-header.open .arrow{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease;
background:var(--bg)}
.accordion-body-inner{padding:16px 20px;color:var(--text2);line-height:1.8}

/* ============================================
   TABLE
   ============================================ */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);
margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th{background:var(--accent);color:#fff;padding:12px 16px;text-align:left;
font-weight:600;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.5px}
td{padding:12px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.status-btn{padding:4px 12px;border-radius:6px;font-size:0.78rem;font-weight:600;
cursor:pointer;transition:all var(--transition)}
.status-btn.done{background:#d4edda;color:#155724}
.status-btn.pending{background:#f8d7da;color:#721c24}
[data-theme="dark"] .status-btn.done{background:#1B4332;color:#52B788}
[data-theme="dark"] .status-btn.pending{background:#3D1C1C;color:#F87171}

/* ============================================
   CHECKLIST
   ============================================ */
.checklist-item{display:flex;align-items:center;gap:12px;padding:10px 16px;
border-bottom:1px solid var(--border);transition:background var(--transition)}
.checklist-item:hover{background:var(--bg2)}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);
cursor:pointer;flex-shrink:0}
.checklist-item.checked .cl-text{text-decoration:line-through;opacity:0.5}
.cl-text{flex:1;font-size:0.9rem}
.cl-cat{font-size:0.7rem;color:var(--text2);background:var(--bg2);
padding:2px 8px;border-radius:8px}
.progress-wrap{margin:20px 0}
.progress-outer{height:12px;background:var(--bg2);border-radius:6px;overflow:hidden}
.progress-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));
border-radius:6px;transition:width 0.5s ease}
.progress-label{display:flex;justify-content:space-between;font-size:0.82rem;
color:var(--text2);margin-top:6px}

/* ============================================
   FORMS & INPUTS
   ============================================ */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:6px;
color:var(--text)}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;
border:1px solid var(--border);border-radius:var(--radius-sm);
background:var(--card);color:var(--text);transition:border var(--transition)}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;
border-color:var(--accent3);box-shadow:0 0 0 3px rgba(64,145,108,0.15)}
.form-textarea{min-height:100px;resize:vertical}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:200px}

/* ============================================
   BUTTONS
   ============================================ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;
border-radius:var(--radius-sm);font-size:0.9rem;font-weight:600;
transition:all var(--transition)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:#dc3545;color:#fff}
.btn-danger:hover{background:#c82333}
.btn-sm{padding:6px 14px;font-size:0.82rem}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ============================================
   SVG INTERACTIVE
   ============================================ */
.svg-container{background:var(--card);border:1px solid var(--border);
border-radius:var(--radius);padding:20px;margin-bottom:16px;overflow-x:auto}
.svg-container svg{width:100%;max-width:600px;margin:0 auto;display:block}
.svg-spot{cursor:pointer;transition:all var(--transition)}
.svg-spot:hover{filter:brightness(1.2);transform-origin:center}
.svg-label{font-family:var(--font-body);font-size:11px;fill:var(--text2)}
.svg-title{font-family:var(--font-heading);font-size:16px;font-weight:700;fill:var(--text)}

/* ============================================
   MIQAT MAP
   ============================================ */
.miqat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:20px;cursor:pointer;transition:all var(--transition);text-align:center}
.miqat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow2);
border-color:var(--accent3)}
.miqat-card.active{border-color:var(--accent);background:var(--bg2)}
.miqat-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);
margin:0 auto 8px;position:relative}
.miqat-dot::after{content:'';position:absolute;inset:-4px;border:2px solid var(--accent3);
border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
.miqat-info{margin-top:16px;padding:20px;background:var(--card);
border:1px solid var(--border);border-radius:var(--radius);display:none}
.miqat-info.show{display:block;animation:fadeUp 0.3s ease}

/* ============================================
   DOA DATABASE
   ============================================ */
.search-box{position:relative;margin-bottom:20px}
.search-box input{width:100%;padding:12px 16px 12px 44px;border:1px solid var(--border);
border-radius:var(--radius);background:var(--card);color:var(--text);font-size:0.95rem}
.search-box input:focus{outline:none;border-color:var(--accent3);
box-shadow:0 0 0 3px rgba(64,145,108,0.15)}
.search-box .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
color:var(--text2);font-size:1.1rem}
.doa-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:20px;margin-bottom:12px;transition:all var(--transition)}
.doa-card:hover{box-shadow:var(--shadow)}
.doa-arabic{font-size:1.5rem;text-align:right;direction:rtl;line-height:2.2;
margin:12px 0;color:var(--accent);font-family:'Amiri','Traditional Arabic',serif}
.doa-latin{font-style:italic;color:var(--text2);margin-bottom:8px;font-size:0.9rem}
.doa-meaning{font-size:0.9rem;color:var(--text2)}
.doa-tag{display:inline-block;background:var(--bg2);padding:2px 8px;border-radius:6px;
font-size:0.72rem;margin-right:4px;color:var(--accent)}
.copy-btn{padding:4px 10px;font-size:0.75rem;background:var(--bg2);
border:1px solid var(--border);border-radius:6px;cursor:pointer;
transition:all var(--transition)}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============================================
   FAQ
   ============================================ */
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
margin-bottom:8px;overflow:hidden}
.faq-q{padding:16px 20px;cursor:pointer;display:flex;align-items:center;
justify-content:space-between;font-weight:600;font-size:0.92rem;
transition:background var(--transition)}
.faq-q:hover{background:var(--bg2)}
.faq-q .arrow{transition:transform var(--transition);font-size:0.75rem;color:var(--text2)}
.faq-q.open .arrow{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.faq-a-inner{padding:0 20px 16px;color:var(--text2);line-height:1.8;font-size:0.9rem}

/* ============================================
   CATATAN JAMAAH
   ============================================ */
.note-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;
transition:all var(--transition)}
.note-card:hover{box-shadow:var(--shadow)}
.note-content{flex:1}
.note-title{font-weight:700;margin-bottom:4px;font-size:0.95rem}
.note-body{color:var(--text2);font-size:0.88rem;line-height:1.6}
.note-date{font-size:0.72rem;color:var(--text2);margin-top:6px}
.note-actions{display:flex;gap:6px;flex-shrink:0}
.note-btn{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;
justify-content:center;font-size:0.8rem;transition:all var(--transition);
background:var(--bg2);border:1px solid var(--border)}
.note-btn:hover{background:var(--accent);color:#fff}

/* ============================================
   SERTIFIKAT
   ============================================ */
.certificate{background:#FFFEF5;border:3px solid var(--gold);border-radius:var(--radius);
padding:48px 40px;text-align:center;position:relative;max-width:700px;margin:0 auto}
.certificate::before{content:'';position:absolute;inset:8px;border:1px solid var(--gold);
border-radius:var(--radius-sm);pointer-events:none}
.certificate h2{font-family:var(--font-heading);color:var(--gold);font-size:1.6rem;
margin-bottom:4px}
.certificate .cert-subtitle{font-size:0.85rem;color:var(--text2);margin-bottom:24px;
letter-spacing:2px;text-transform:uppercase}
.certificate .cert-name{font-family:var(--font-heading);font-size:2.4rem;
color:var(--accent);border-bottom:2px solid var(--gold);display:inline-block;
padding-bottom:4px;margin-bottom:16px}
.certificate .cert-details{font-size:0.9rem;color:var(--text2);line-height:1.8}
.cert-decoration{font-size:3rem;margin-bottom:8px}

/* ============================================
   TOAST
   ============================================ */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;
flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:0.88rem;
font-weight:500;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s;
box-shadow:var(--shadow2);display:flex;align-items:center;gap:8px;min-width:260px}
.toast-success{background:var(--accent2)}
.toast-error{background:#dc3545}
.toast-info{background:#0d6efd}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(40px)}}

/* ============================================
   FLOATING ACTIONS
   ============================================ */
.fab{position:fixed;bottom:24px;right:24px;z-index:900;display:flex;
flex-direction:column;gap:10px;align-items:flex-end}
.fab-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:1.2rem;box-shadow:var(--shadow2);
transition:all var(--transition);cursor:pointer}
.fab-btn:hover{transform:scale(1.1)}
.fab-top{background:var(--accent);color:#fff}
.fab-dark{background:var(--card);color:var(--text);border:1px solid var(--border)}
.fab-bookmark{background:var(--terracotta);color:#fff}

/* ============================================
   SEARCH MODAL
   ============================================ */
.search-modal{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);
backdrop-filter:blur(4px);display:none;align-items:flex-start;
justify-content:center;padding-top:15vh}
.search-modal.show{display:flex}
.search-box-modal{width:90%;max-width:600px;background:var(--card);
border-radius:var(--radius);box-shadow:var(--shadow2);overflow:hidden;
animation:fadeUp 0.3s ease}
.search-box-modal input{width:100%;padding:18px 24px;font-size:1.1rem;
border:none;background:transparent;color:var(--text)}
.search-box-modal input:focus{outline:none}
.search-results{max-height:400px;overflow-y:auto;border-top:1px solid var(--border)}
.search-result-item{padding:12px 24px;cursor:pointer;transition:background var(--transition);
font-size:0.9rem}
.search-result-item:hover{background:var(--bg2)}
.search-result-item .sr-page{font-size:0.75rem;color:var(--accent);font-weight:600}

/* ============================================
   ANIMATIONS
   ============================================ */
.animate-in{opacity:0;transform:translateY(20px);transition:all 0.5s ease}
.animate-in.visible{opacity:1;transform:translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes tawafRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tawaf-anim{animation:tawafRotate 8s linear infinite}
.sai-dot{transition:all 0.5s ease}

/* ============================================
   CALCULATOR
   ============================================ */
.calc-result{background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#fff;border-radius:var(--radius);padding:24px;text-align:center;
margin-top:16px}
.calc-result .calc-value{font-family:var(--font-heading);font-size:3rem;
font-weight:800;line-height:1}
.calc-result .calc-unit{font-size:0.9rem;opacity:0.8;margin-top:4px}

/* ============================================
   BOOKMARK
   ============================================ */
.bookmark-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;
border-radius:50%;background:var(--bg2);display:flex;align-items:center;
justify-content:center;cursor:pointer;transition:all var(--transition);
font-size:0.9rem;border:1px solid var(--border)}
.bookmark-btn:hover,.bookmark-btn.active{background:var(--gold);color:#fff;
border-color:var(--gold)}

/* ============================================
   EMERGENCY
   ============================================ */
.emergency-btn{background:#dc3545;color:#fff;padding:20px;border-radius:var(--radius);
text-align:center;font-size:1.1rem;font-weight:700;cursor:pointer;
transition:all var(--transition);position:relative;overflow:hidden}
.emergency-btn:hover{background:#c82333;transform:scale(1.02)}
.emergency-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(
45deg,transparent,rgba(255,255,255,0.1),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:768px){
.page{padding:20px 16px 80px}
.hero{padding:32px 24px}
.hero h1{font-size:1.8rem}
.hero-geo{font-size:160px}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.grid-2,.grid-3{grid-template-columns:1fr}
.timeline{gap:2px;padding:12px}
.timeline-step{padding:6px 8px;font-size:0.72rem}
.certificate{padding:32px 20px}
.certificate .cert-name{font-size:1.6rem}
.sidebar{width:260px}
}
@media(max-width:480px){
.stats-grid{grid-template-columns:1fr 1fr}
.stat-number{font-size:1.6rem}
.hero h1{font-size:1.5rem}
}

/* ============================================
   PRINT
   ============================================ */
@media print{
.sidebar,.hamburger,.fab,.toast-container{display:none!important}
.main{margin-left:0!important}
.page{display:block!important;padding:10px!important}
.card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
}

/* ============================================
   TABS
   ============================================ */
.tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;
padding-bottom:4px;border-bottom:2px solid var(--border)}
.tab{padding:8px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;
border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;
transition:all var(--transition);color:var(--text2)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;animation:fadeUp 0.3s ease}
.tab-content.active{display:block}

/* ============================================
   MISC
   ============================================ */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:0.4}
.divider{height:1px;background:var(--border);margin:24px 0}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;
transform:translateX(-50%);background:var(--text);color:var(--bg);
padding:4px 8px;border-radius:4px;font-size:0.72rem;white-space:nowrap;
opacity:0;pointer-events:none;transition:opacity 0.2s}
.tooltip:hover::after{opacity:1}
</style>

  {q:'Berapa lama perjalanan umrah?',a:'Umumnya 9-14 hari, dengan pembagian 3-5 hari di Madinah dan 5-8 hari di Makkah. Durasi dapat bervariasi sesuai paket travel.'},
  {q:'Kapan waktu terbaik untuk umrah?',a:'Bulan-bulan yang lebih sepi: Muharram, Safar, Rabiul Awal. Hindari Ramadhan dan bulan Haji karena sangat ramai. Cuaca paling nyaman antara November-Februari.'},
  {q:'Apakah umrah bisa dilakukan berkali-kali?',a:'Ya, tidak ada batasan berapa kali umrah boleh dilakukan. Namun sebagian ulama menyarankan menyisakan kesempatan bagi yang belum pernah.'},
  {q:'Apa syarat wajib umrah?',a:'Islam, baligh, berakal, merdeka, dan mampu (dari segi fisik, finansial, dan keamanan perjalanan).'},
  {q:'Apakah wanita haid bisa berumrah?',a:'Wanita haid tidak boleh melakukan tawaf, namun bisa melakukan aktivitas lainnya. Ia harus menunggu bersih untuk menunaikan tawaf.'},
  {q:'Bagaimana jika lupa niat ihram?',a:'Niat ihram harus dilakukan sebelum melewati miqat. Jika terlanjur melewati miqat tanpa niat, wajib membayar dam (denda).'},
  {q:'Apa yang dimaksud Miqat?',a:'Miqat adalah batas wilayah tempat jamaah harus berihram. Ada 5 miqat yang ditetapkan Rasulullah SAW untuk jamaah dari berbagai arah.'},
  {q:'Bolehkah memakai wangi-wangian saat ihram?',a:'Tidak boleh. Larangan ihram termasuk menggunakan parfum atau wewangian pada badan maupun pakaian ihram.'},
  {q:'Apakah boleh memotong kuku saat ihram?',a:'Tidak boleh. Memotong kuku termasuk larangan ihram. Sebaiknya memotong kuku sebelum berihram.'},
  {q:'Berapa putaran tawaf?',a:'Tawaf dilakukan 7 putaran mengelilingi Ka\'bah, dimulai dari Hajar Aswad dan berakhir di Hajar Aswad, dengan Ka\'bah di sebelah kiri.'},
  {q:'Apa itu Hajar Aswad?',a:'Hajar Aswad adalah batu hitam yang terletak di sudut Ka\'bah. Batu ini berasal dari surga menurut hadits. Jamaah sunnah menyentuh atau menciumnya jika memungkinkan.'},
  {q:'Apa itu Maqam Ibrahim?',a:'Maqam Ibrahim adalah batu tempat Nabi Ibrahim AS berdiri saat membangun Ka\'bah. Sekarang diletakkan di depan Ka\'bah dalam sangkar kaca.'},
  {q:'Berapa perjalanan sa\'i?',a:'Sa\'i terdiri dari 7 perjalanan antara bukit Shafa dan Marwah. 1 perjalanan = dari Shafa ke Marwah atau sebaliknya. Dimulai dari Shafa dan berakhir di Marwah.'},
  {q:'Apa itu Tahallul?',a:'Tahallul adalah memotong rambut sebagai tanda selesainya ibadah umrah. Pria disunahkan mencukur gundul (taqsir) dan wanita memotong ujung rambut sepanjang satu ruas jari.'},
  {q:'Apakah boleh menggunakan kursi roda untuk tawaf?',a:'Boleh. Jamaah yang tidak mampu berjalan boleh menggunakan kursi roda atau didorong oleh pendamping selama tawaf dan sa\'i.'},
  {q:'Apa itu Tawaf Wada?',a:'Tawaf Wada adalah tawaf perpisahan yang dilakukan sebelum meninggalkan Makkah. Hukumnya wajib bagi jamaah yang akan pulang.'},
  {q:'Bolehkan shalat di Raudhah setiap hari?',a:'Bisa jika mendapat giliran. Saat ini akses ke Raudhah diatur melalui reservasi atau giliran sesuai jadwal yang ditentukan pihak otoritas.'},
  {q:'Bagaimana cara mendapat giliran Raudhah?',a:'Melalui aplikasi resmi atau mengikuti jadwal yang ditentukan oleh otoritas Masjid Nabawi. Biasanya travel sudah mengatur jadwal rombongan.'},
  {q:'Berapa jarak Madinah-Makkah?',a:'Sekitar 420 km, ditempuh sekitar 4-5 jam via bus, atau 2 jam via Kereta Haramain.'},
  {q:'Apa nama bandara di Madinah?',a:'Bandara Pangeran Mohammad bin Abdulaziz (MAD/OEMA).'},
  {q:'Apa nama bandara di Jeddah?',a:'Bandara King Abdulaziz International Airport (JED/OEJN).'},
  {q:'Apakah kereta Haramain tersedia untuk jamaah umrah?',a:'Ya, kereta Haramain menghubungkan Makkah, Jeddah, King Abdullah Economic City, dan Madinah. Namun stasiun di Makkah berada di Rusaifa, bukan di pusat kota.'},
  {q:'Mata uang apa yang digunakan di Arab Saudi?',a:'Riyal Saudi (SAR). 1 Riyal ≈ Rp 4.100-4.300 (bervariasi). Disarankan menukar sebelum berangkat atau di money changer lokal.'},
  {q:'Apakah bahasa Indonesia umum dipahami di Arab Saudi?',a:'Di area sekitar Masjidil Haram dan Masjid Nabawi, banyak pekerja yang memahami bahasa Indonesia. Namun di luar area tersebut, bahasa Arab atau Inggris lebih umum.'},
  {q:'Bolehkah membawa makanan dari Indonesia?',a:'Boleh dalam jumlah wajar untuk konsumsi pribadi. Mi instan dan kopi sachet sangat umum dibawa jamaah Indonesia. Hindari makanan yang mengandung bahan tidak halal.'},
  {q:'Apa aplikasi yang wajib diunduh?',a:'Tawakkalna (untuk izin masuk masjid), Eatmarna (reservasi Raudhah), dan aplikasi dari travel Anda.'},
  {q:'Apakah ada SIM card lokal?',a:'Ya, bisa membeli SIM card di bandara atau toko telekomunikasi. Operator utama: STC, Mobily, Zain. Banyak travel yang menyediakan SIM card.'},
  {q:'Suhu di Arab Saudi berapa?',a:'Musim panas (Juni-Agustus): 40-50°C. Musim dingin (Desember-Februari): 15-25°C. Suhu masjid tetap sejuk berkat AC.'},
  {q:'Bagaimana jika sakit saat umrah?',a:'Segera hubungi pembimbing. Ada klinik di sekitar Masjidil Haram dan Masjid Nabawi. Untuk darurat, hubungi 911 (nomor darurat Arab Saudi).'},
  {q:'Apakah asuransi perjalanan wajib?',a:'Wajib sesuai ketentuan pemerintah Arab Saudi. Biasanya sudah termasuk dalam paket travel. Pastikan asuransi mencakup perawatan medis dan repatriasi.'},
  {q:'Apa yang dilakukan jika tersesat?',a:'Tetap tenang, cari lokasi yang dikenali, hubungi pembimbing via telepon, atau minta bantuan petugas keamanan masjid. Simpan selalu nomor pembimbing.'},
  {q:'Bolehkah foto di dalam masjid?',a:'Boleh untuk dokumentasi pribadi, tetapi tidak boleh mengganggu jamaah lain. Dilarang keras memfoto orang tanpa izin. Selfie stick dilarang di area masjid.'},
  {q:'Apa adab saat di Masjid Nabawi?',a:'Berpakaian rapi, menjaga kebersihan, tidak berteriak, berdoa dengan khusyuk, membaca shalawat, tidak mendesak jamaah lain, dan menghormati kesucian tempat.'},
  {q:'Apa itu Hijr Ismail?',a:'Hijr Ismail (Hatem) adalah area berbentuk setengah lingkaran di samping Ka\'bah. Ini adalah bagian dari Ka\'bah menurut sebagian riwayat. Shalat di dalamnya sangat dianjurkan.'},
  {q:'Di mana letak Multazam?',a:'Multazam adalah dinding Ka\'bah antara Hajar Aswad dan pintu Ka\'bah. Tempat mustajab untuk berdoa.'},
  {q:'Apa itu Sumur Zamzam?',a:'Sumur Zamzam adalah sumur yang muncul sejak zaman Nabi Ibrahim AS, airnya tidak pernah kering. Terletak di dalam Masjidil Haram. Jamaah boleh meminumnya gratis.'},
  {q:'Bolehkan membawa air Zamzam ke Indonesia?',a:'Boleh. Tersedia kemasan resmi 5 liter dan 10 liter di bandara. Batas maksimum bervariasi, umumnya 5-10 liter per orang.'},
  {q:'Apa saja oleh-oleh khas Arab Saudi?',a:'Kurma (Ajwa, Sukkari, Safawi), air Zamzam, sajadah, tasbih, parfum non-alkohol (oud, attar), cokelat, dan batu akik.'},
  {q:'Berapa harga kurma di Arab Saudi?',a:'Bervariasi tergantung jenis. Kurma biasa: 10-20 Riyal/kg. Kurma premium (Ajwa, Sukkari): 50-150 Riyal/kg. Harga di pasar lebih murah dari supermarket.'},
  {q:'Di mana tempat belanja terbaik di Madinah?',a:'Pasar kurma di dekat Masjid Nabawi, Dates Market, dan mall-mall seperti Al Noor Mall dan Rashid Mall.'},
  {q:'Di mana tempat belanja terbaik di Makkah?',a:'Souk Al Khalil, Abraj Al Bait Mall, dan pasar tradisional di sekitar Masjidil Haram.'},
  {q:'Apa larangan saat ihram?',a:'1) Memotong kuku dan rambut, 2) Memakai wangi-wangian, 3) Memakai pakaian berjahit (pria), 4) Menutup kepala (pria), 5) Menutup wajah (wanita), 6) Berburu, 7) Akad nikah, 8) Hubungan suami istri, 9) Bertengkar.'},
  {q:'Apa dam (denda) umrah?',a:'Dam adalah kompensasi atas pelanggaran larangan ihram. Bentuknya: menyembelih kambing, atau memberi makan 6 orang miskin, atau berpuasa 3 hari.'},
  {q:'Apakah boleh umrah atas nama orang lain?',a:'Boleh (badal umrah) dengan syarat orang tersebut sudah meninggal atau tidak mampu secara fisik. Pelaksana harus sudah pernah berumrah untuk dirinya sendiri.'},
  {q:'Bagaimana cara mendapat visa umrah?',a:'Melalui travel agent resmi yang terdaftar di Kementerian Haji Arab Saudi. Visa diterbitkan secara elektronik (e-visa).'},
  {q:'Apakah vaksin wajib untuk umrah?',a:'Ya, vaksin Meningitis Meningococcal (ACYW135) wajib. Vaksin COVID-19 sesuai ketentuan terkini. Vaksin influenza dan pneumonia dianjurkan untuk lansia.'},
  {q:'Kapan waktu shalat di Arab Saudi?',a:'Shalat Subuh: ~4:30, Dzuhur: ~12:00, Ashar: ~15:30, Maghrib: ~18:00, Isya: ~19:30. Waktu berubah sesuai musim. Aplikasi shalat menampilkan waktu akurat.'},
  {q:'Apa tips agar tidak tersesat di masjid?',a:'1) Perhatikan nomor pintu masjid, 2) Gunakan landmark sekitar, 3) Aktifkan GPS, 4) Simpan nomor pembimbing, 5) Foto lokasi parkir hotel, 6) Pergi berkelompok.'},
];

// STATE MANAGEMENT
// ============================================
let state = {
  currentPage: 'beranda',
  theme: localStorage.getItem('umrah_theme') || 'light',
  bookmarks: JSON.parse(localStorage.getItem('umrah_bookmarks') || '[]'),
  visitedPages: JSON.parse(localStorage.getItem('umrah_visited') || '[]'),
  dokumenStatus: JSON.parse(localStorage.getItem('umrah_dokumen') || 'null') || DOKUMEN_DATA.map(d=>({id:d.id,status:false})),
  perlengkapanCheck: JSON.parse(localStorage.getItem('umrah_perlengkapan') || '[]'),
  checklistCheck: JSON.parse(localStorage.getItem('umrah_checklist') || '[]'),
  catatan: JSON.parse(localStorage.getItem('umrah_catatan') || '[]'),
};

function saveState(){
  localStorage.setItem('umrah_theme',state.theme);
  localStorage.setItem('umrah_bookmarks',JSON.stringify(state.bookmarks));
  localStorage.setItem('umrah_visited',JSON.stringify(state.visitedPages));
  localStorage.setItem('umrah_dokumen',JSON.stringify(state.dokumenStatus));
  localStorage.setItem('umrah_perlengkapan',JSON.stringify(state.perlengkapanCheck));
  localStorage.setItem('umrah_checklist',JSON.stringify(state.checklistCheck));
  localStorage.setItem('umrah_catatan',JSON.stringify(state.catatan));
}

// ============================================
// UI UTILITIES
// ============================================
function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.innerHTML=(type==='success'?'✓ ':type==='error'?'✗ ':'ℹ ')+msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('show');
}

function toggleTheme(){
  state.theme=state.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',state.theme);
  saveState();
  showToast('Mode '+state.theme==='dark'?'Gelap':'Terang'+' diaktifkan');
}

function toggleBookmarkPage(){
  const pg=state.currentPage;
  if(state.bookmarks.includes(pg)){
    state.bookmarks=state.bookmarks.filter(b=>b!==pg);
    showToast('Bookmark dihapus');
  }else{
    state.bookmarks.push(pg);
    showToast('Halaman di-bookmark!');
  }
  saveState();
  updateBookmarkBtn();
}

function updateBookmarkBtn(){
  const btn=document.querySelector('.fab-bookmark');
  if(btn){
    btn.style.background=state.bookmarks.includes(state.currentPage)?'var(--gold)':'var(--terracotta)';
    btn.textContent=state.bookmarks.includes(state.currentPage)?'★':'☆';
  }
}

function navigateTo(pageId){
  state.currentPage=pageId;
  if(!state.visitedPages.includes(pageId)){
    state.visitedPages.push(pageId);
    saveState();
  }
  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active',n.dataset.page===pageId);
  });
  // Show page
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.toggle('active',p.id==='page-'+pageId);
  });
  window.scrollTo({top:0,behavior:'smooth'});
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('show');
  updateBookmarkBtn();
  updateGlobalProgress();
}

function updateGlobalProgress(){
  const pct=Math.round((state.visitedPages.length/PAGES.length)*100);
  document.getElementById('globalProgress').style.width=pct+'%';
  document.getElementById('globalProgressText').textContent=pct+'% selesai ('+state.visitedPages.length+'/'+PAGES.length+' halaman)';
}

function openSearch(){
  document.getElementById('searchModal').classList.add('show');
  document.getElementById('globalSearchInput').focus();
}
function closeSearch(){
  document.getElementById('searchModal').classList.remove('show');
}
function globalSearch(query){
  const r=document.getElementById('globalSearchResults');
  if(!query){r.innerHTML='';return;}
  const q=query.toLowerCase();
  let html='';
  // Search pages
  PAGES.forEach(p=>{
    if(p.label.toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="navigateTo('${p.id}');closeSearch()"><span class="sr-page">${p.icon} ${p.label}</span></div>`;
    }
  });
  // Search doa
  DOA_DATA.forEach(d=>{
    if(d.title.toLowerCase().includes(q)||d.meaning.toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="navigateTo('doa');closeSearch()">🤲 ${d.title}<br><span class="sr-page">Doa - ${d.cat}</span></div>`;
    }
  });
  // Search FAQ
  FAQ_DATA.forEach((f,i)=>{
    if(f.q.toLowerCase().includes(q)||f.a.toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="navigateTo('faq');closeSearch()">❓ ${f.q}<br><span class="sr-page">FAQ #${i+1}</span></div>`;
    }
  });
  r.innerHTML=html||'<div class="search-result-item" style="color:var(--text2)">Tidak ditemukan</div>';
}

// Keyboard shortcut
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape')closeSearch();
});

function buildSidebar(){
  const nav=document.getElementById('sidebarNav');
  nav.innerHTML=PAGES.map(p=>`
    <div class="nav-item${p.id==='beranda'?' active':''}" data-page="${p.id}" onclick="navigateTo('${p.id}')">
      <span class="nav-icon">${p.icon}</span>
      <span class="nav-label">${p.label}</span>
      ${p.badge?`<span class="nav-badge">${p.badge}</span>`:''}
    </div>
  `).join('');
}

  // PENGERTIAN UMRAH
  html+=`<div class="page" id="page-pengertian">
    <h1 class="section-title">Pengertian Umrah</h1>
    <p class="section-subtitle">Memahami esensi ibadah Umrah secara mendalam</p>
    
    <div class="highlight-box">
      <h3>Apa Itu Umrah?</h3>
      <p>Umrah secara bahasa berarti "berziarah" atau "mengunjungi". Secara istilah syariat, Umrah adalah mengunjungi Baitullah (Ka'bah) di Makkah untuk melaksanakan ibadah tertentu dengan niat dan syarat-syarat yang telah ditetapkan oleh Allah SWT. Berbeda dengan Haji yang memiliki waktu tertentu, Umrah dapat dilaksanakan kapan saja sepanjang tahun.</p>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">📜 Dasar Hukum Umrah</div>
        <p><strong>Al-Qur'an:</strong> "Dan sempurnakanlah ibadah haji dan umrah karena Allah." (QS. Al-Baqarah: 196)</p>
        <p style="margin-top:8px"><strong>Hadits:</strong> "Umrah ke umrah berikutnya adalah penghapus dosa di antara keduanya, dan haji yang mabrur tidak ada balasannya kecuali surga." (HR. Bukhari & Muslim)</p>
        <p style="margin-top:8px"><strong>Ijma':</strong> Mayoritas ulama sepakat bahwa hukum umrah adalah sunnah muakkadah (sunnah yang sangat dianjurkan). Namun Imam Abu Hanifah menganggapnya wajib bagi yang mampu, berdasarkan ayat di atas.</p>
      </div>
      <div class="card">
        <div class="card-title">⚖️ Hukum Umrah</div>
        <p><strong>Mazhab Hanafi:</strong> Wajib bagi yang mampu (berdasarkan QS. Al-Baqarah: 196).</p>
        <p style="margin-top:6px"><strong>Mazhab Maliki:</strong> Sunnah muakkadah, tidak wajib.</p>
        <p style="margin-top:6px"><strong>Mazhab Syafi'i:</strong> Sunnah muakkadah yang sangat dianjurkan.</p>
        <p style="margin-top:6px"><strong>Mazhab Hambali:</strong> Wajib sekali seumur hidup bagi yang mampu.</p>
        <p style="margin-top:8px"><strong>Kesimpulan:</strong> Meski ada perbedaan pendapat, seluruh ulama menyetujui bahwa umrah adalah ibadah yang sangat agung dan dianjurkan bagi setiap muslim yang mampu.</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🌟 Keutamaan Umrah</div>
      <div class="grid-2" style="margin-top:12px">
        <div>
          <p>1. <strong>Penghapus dosa</strong> — Seperti yang disebutkan dalam hadits, umrah adalah penghapus dosa antara umrah sebelumnya.</p>
          <p style="margin-top:6px">2. <strong>Pahala setara jihad</strong> — "Umrah adalah jihad bagi orang yang tidak mampu berjihad." (HR. An-Nasai)</p>
          <p style="margin-top:6px">3. <strong>Doa mustajab</strong> — Doa jamaah umrah sangat besar peluang dikabulkan Allah SWT.</p>
        </div>
        <div>
          <p>4. <strong>Menghapus kemiskinan</strong> — "Ikutilah haji dan umrah, karena keduanya menghapus kemiskinan dan dosa." (HR. Ibnu Majah)</p>
          <p style="margin-top:6px">5. <strong>Tamu Allah</strong> — Jamaah umrah adalah tamu Allah yang dimuliakan.</p>
          <p style="margin-top:6px">6. <strong>Pahala surga</strong> — Umrah yang diterima (mabrur) balasannya surga.</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔄 Perbedaan Umrah dan Haji</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Aspek</th><th>Umrah</th><th>Haji</th></tr></thead>
          <tbody>
            <tr><td>Waktu Pelaksanaan</td><td>Kapan saja sepanjang tahun</td><td>Bulan Dzulhijjah (8-13)</td></tr>
            <tr><td>Rukun</td><td>Ihram, Tawaf, Sa'i, Tahallul</td><td>Ihram, Wukuf, Tawaf, Sa'i, Tahallul</td></tr>
            <tr><td>Wukuf di Arafah</td><td>Tidak ada</td><td>Wajib (rukun terpenting)</td></tr>
            <tr><td>Lempar Jumrah</td><td>Tidak ada</td><td>Wajib</td></tr>
            <tr><td>Mabit di Mina</td><td>Tidak ada</td><td>Wajib</td></tr>
            <tr><td>Durasi</td><td>2-3 jam (inti ibadah)</td><td>5-6 hari</td></tr>
            <tr><td>Hukum</td><td>Sunnah/Wajib (khilafiyah)</td><td>Wajib bagi yang mampu</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  // PERSIAPAN UMRAH
  html+=`<div class="page" id="page-persiapan">
    <h1 class="section-title">Persiapan Umrah</h1>
    <p class="section-subtitle">Persiapan menyeluruh agar ibadah umrah berjalan lancar dan khusyuk</p>
    
    <div class="highlight-box">
      <h3>🔑 Kunci Persiapan Umrah</h3>
      <p>Persiapan umrah tidak hanya soal dokumen dan perlengkapan. Yang lebih penting adalah persiapan spiritual dan mental. Ibadah umrah adalah perjalanan rohani, bukan sekadar wisata religi. Hatimu harus lebih siap daripada kopelmu.</p>
    </div>

    <div class="tabs" id="persiapanTabs">
      <div class="tab active" onclick="switchTab('persiapan','spiritual')">🕌 Spiritual</div>
      <div class="tab" onclick="switchTab('persiapan','mental')">🧠 Mental</div>
      <div class="tab" onclick="switchTab('persiapan','fisik')">💪 Fisik</div>
    </div>

    <div class="tab-content active" id="tab-persiapan-spiritual">
      <div class="card">
        <div class="card-title">🕌 Persiapan Spiritual</div>
        <div class="accordion" id="acc-spiritual">
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Niat yang Ikhlas <span class="arrow">▼</span></div>
            <div class="accordion-body"><div class="accordion-body-inner">
              <p>Niat adalah pondasi utama ibadah umrah. Pastikan niat Anda semata-mata karena Allah SWT, bukan karena gengsi, tren, atau tekanan orang lain. Niat yang ikhlas akan menjadikan setiap langkah Anda penuh keberkahan.</p>
              <p style="margin-top:8px"><strong>Tips:</strong> Ucapkan niat dalam hati saat berihram: "Nawaitul umrata wa ahramtu biha lillahi ta'ala" (Saya niat umrah dan saya berihram dengannya karena Allah Ta'ala).</p>
            </div></div>
          </div>
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Taubat dari Dosa <span class="arrow">▼</span></div>
            <div class="accordion-body"><div class="accordion-body-inner">
              <p>Bertaubatlah dari segala dosa sebelum berangkat. Tobat nasuha adalah tobat yang dilakukan dengan sungguh-sungguh: menyesali perbuatan, berhenti dari perbuatan, dan bertekad tidak mengulanginya.</p>
              <p style="margin-top:8px">Perbanyak istighfar, shalat tahajjud, dan memohon ampunan Allah SWT. Sempurnakan tobat Anda agar hati bersih menyambut ibadah.</p>
            </div></div>
          </div>
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Melunasi Hutang <span class="arrow">▼</span></div>
            <div class="accordion-body"><div class="accordion-body-inner">
              <p>Hutang adalah beban yang harus diselesaikan sebelum berangkat. Jika memungkinkan, lunasi seluruh hutang. Jika tidak mampu, minta izin dan kerelaan dari pihak yang memberi hutang.</p>
              <p style="margin-top:8px"><strong>Penting:</strong> Hutang yang belum dilunasi bisa menjadi penghalang doa dan ketenangan hati selama ibadah.</p>
            </div></div>
          </div>
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Meminta Maaf <span class="arrow">▼</span></div>
            <div class="accordion-body"><div class="accordion-body-inner">
              <p>Mintalah maaf kepada kedua orang tua, pasangan, anak-anak, saudara, tetangga, dan rekan kerja. Umrah adalah perjalanan yang tidak ada jaminan kita akan kembali. Perbaiki hubungan dengan sesama manusia sebelum memperbaiki hubungan dengan Allah.</p>
              <p style="margin-top:8px">Jabat tangan, ucapkan maaf dengan tulus, dan minta doa restu dari mereka.</p>
            </div></div>
          </div>
          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Menata Hati <span class="arrow">▼</span></div>
            <div class="accordion-body"><div class="accordion-body-inner">
              <p>Hati adalah tempat Allah memandang. Bersihkan hati dari dendam, hasud, iri, dan dengki. Tanamkan dalam hati rasa cinta kepada Allah dan Rasul-Nya. Bayangkan Anda akan berdiri di depan Ka'bah, tempat yang paling dicintai Allah di muka bumi.</p>
              <p style="margin-top:8px">Perbanyak membaca Al-Qur'an, shalawat, dan dzikir di hari-hari menjelang keberangkatan.</p>
            </div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-persiapan-mental">
      <div class="card">
        <div class="card-title">🧠 Persiapan Mental</div>
        <div class="grid-2">
          <div class="card" style="border-left:4px solid var(--accent3)">
            <h4 style="color:var(--accent)">Kesabaran</h4>
            <p>Umrah membutuhkan kesabaran ekstra. Anda akan menghadapi keramaian, antrean panjang, cuaca panas, dan berbagai situasi yang menguji kesabaran. Ingatlah bahwa setiap kesabaran Anda di tanah suci bernilai ibadah.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--gold)">
            <h4 style="color:var(--accent)">Disiplin</h4>
            <p>Patuhi jadwal yang ditetapkan pembimbing. Keterlambatan satu orang bisa mengganggu seluruh rombongan. Biasakan bangun tepat waktu dan siap sebelum jadwal keberangkatan.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--terracotta)">
            <h4 style="color:var(--accent)">Kebersamaan</h4>
            <p>Anda akan bersama rombongan selama perjalanan. Hormati perbedaan, bantu sesama jamaah, dan jaga ukhuwah islamiyah. Kebersamaan yang baik akan membuat perjalanan lebih bermakna.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--accent2)">
            <h4 style="color:var(--accent)">Menghadapi Keramaian</h4>
            <p>Masjidil Haram saat puncak kepadatan bisa menampung jutaan jamaah. Siapkan mental untuk berdesakan, tetap tenang, dan jangan panik. Ikuti arus jamaah saat tawaf, jangan melawan arah.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-persiapan-fisik">
      <div class="card">
        <div class="card-title">💪 Persiapan Fisik</div>
        <div class="grid-3" style="margin-top:12px">
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">🚶</div>
            <h4 style="color:var(--accent)">Jalan Kaki</h4>
            <p style="font-size:0.85rem">Latihan jalan kaki minimal 3-5 km per hari, 2-4 minggu sebelum berangkat. Tawaf dan sa'i membutuhkan stamina jalan yang baik.</p>
          </div>
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">🏋️</div>
            <h4 style="color:var(--accent)">Latihan Stamina</h4>
            <p style="font-size:0.85rem">Lakukan olahraga ringan: jalan cepat, senam, atau naik tangga. Tujuannya memperkuat otot kaki dan paru-paru.</p>
          </div>
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">🥗</div>
            <h4 style="color:var(--accent)">Pola Makan</h4>
            <p style="font-size:0.85rem">Konsumsi makanan bergizi seimbang. Perbanyak sayur, buah, dan protein. Kurangi makanan berlemak dan terlalu manis.</p>
          </div>
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">😴</div>
            <h4 style="color:var(--accent)">Istirahat Cukup</h4>
            <p style="font-size:0.85rem">Tidur 7-8 jam per malam. Mulai atur pola tidur 2 minggu sebelum berangkat agar tubuh terbiasa dengan perubahan waktu.</p>
          </div>
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">💧</div>
            <h4 style="color:var(--accent)">Hidrasi</h4>
            <p style="font-size:0.85rem">Biasakan minum air putih minimal 2 liter per hari. Di Arab Saudi, dehidrasi adalah masalah umum bagi jamaah.</p>
          </div>
          <div class="card" style="text-align:center">
            <div class="icon-circle" style="margin:0 auto 8px">🏥</div>
            <h4 style="color:var(--accent)">Medical Check-up</h4>
            <p style="font-size:0.85rem">Periksakan kesehatan sebelum berangkat, terutama jantung, tekanan darah, dan diabetes. Bawa obat pribadi secukupnya.</p>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // KESEHATAN
  html+=`<div class="page" id="page-kesehatan">
    <h1 class="section-title">Kesehatan Jamaah</h1>
    <p class="section-subtitle">Jaga kesehatan agar ibadah berjalan optimal</p>
    
    <div class="grid-2">
      <div class="card">
        <div class="card-title">💉 Vaksin Wajib</div>
        <p><strong>Vaksin Meningitis (ACYW135)</strong> — Wajib bagi seluruh jamaah. Harus dilakukan minimal 10 hari sebelum keberangkatan. Masa berlaku 3 tahun.</p>
        <p style="margin-top:8px"><strong>Vaksin COVID-19</strong> — Sesuai ketentuan terkini pemerintah Arab Saudi.</p>
        <p style="margin-top:8px"><strong>Vaksin Influenza</strong> — Dianjurkan terutama bagi lansia dan penderita penyakit kronis.</p>
        <p style="margin-top:8px"><strong>Vaksin Pneumonia</strong> — Dianjurkan bagi jamaah usia 60 tahun ke atas.</p>
      </div>
      <div class="card">
        <div class="card-title">💊 Obat Pribadi</div>
        <p>Bawa obat-obatan yang biasa Anda konsumsi, termasuk:</p>
        <ul style="margin-left:20px;color:var(--text2);font-size:0.9rem;margin-top:8px">
          <li>Obat hipertensi/diabetes (jika ada)</li>
          <li>Obat demam (paracetamol)</li>
          <li>Obat diare (diapet/lomotil)</li>
          <li>Obat maag (antacid)</li>
          <li>Obat batuk/pilek</li>
          <li>Minyak kayu putih / balsam</li>
          <li>Plaster luka dan obat merah</li>
          <li>Masker medis (beberapa buah)</li>
          <li>Vitamin C dan multivitamin</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🤒 Penyakit Kronis</div>
      <p style="margin-bottom:12px">Jamaah dengan penyakit kronis harus ekstra waspada:</p>
      <div class="grid-3">
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Diabetes</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Bawa obat cukup, jaga pola makan, periksa gula darah rutin, bawa glukosa darurat.</p>
        </div>
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Hipertensi</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Minum obat teratur, hindari makanan asin, jaga emosi, istirahat cukup, cek tekanan darah.</p>
        </div>
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Asma</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Selalu bawa inhaler, hindari debu dan keramaian berlebihan, pakai masker.</p>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">☀️ Tips Dehidrasi</div>
        <ul style="margin-left:20px;color:var(--text2);font-size:0.9rem">
          <li>Minum air putih minimal 3 liter/hari di Arab Saudi</li>
          <li>Bawa botol air ke mana-mana</li>
          <li>Minum sebelum haus, jangan tunggu haus</li>

  // MANASIK
  html+=`<div class="page" id="page-manasik">
    <h1 class="section-title">Manasik Umrah</h1>
    <p class="section-subtitle">Pemahaman mendalam tentang tata cara ibadah umrah</p>
    
    <div class="highlight-box">
      <h3>☪ Rukun Umrah</h3>
      <p>Rukun adalah pondasi utama ibadah umrah. Jika salah satu rukun ditinggalkan, umrah tidak sah. Ada 4 rukun umrah: <strong>Ihram, Tawaf, Sa'i, dan Tahallul</strong>. Berbeda dengan haji, umrah tidak memiliki wukuf di Arafah.</p>
    </div>

    <div class="accordion">
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">1. Ihram — Niat dan Berpakaian Ihram <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p><strong>Pengertian:</strong> Ihram adalah niat melaksanakan umrah dan memulai ibadah dengan meninggalkan hal-hal yang dilarang. Ihram dilakukan di miqat sebelum memasuki Makkah.</p>
          <p style="margin-top:8px"><strong>Pakaian Ihram Pria:</strong> Dua lembar kain putih yang tidak berjahit, satu dililitkan di pinggang dan satu disampirkan di bahu. Tidak boleh memakai pakaian berjahit lainnya.</p>
          <p style="margin-top:8px"><strong>Pakaian Ihram Wanita:</strong> Pakaian biasa yang menutup aurat (tidak wajib putih, tidak boleh niqab/penutup wajah). Cukup menampakkan wajah dan kedua telapak tangan.</p>
          <p style="margin-top:8px"><strong>Niat:</strong> "Nawaitul umrata wa ahramtu biha lillahi ta'ala"</p>
          <p style="margin-top:8px"><strong>Sunnah sebelum ihram:</strong> Mandi, bersiwak, memotong kuku, memakai minyak rambut/wangian sebelum memakai ihram, shalat 2 rakaat.</p>
        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">2. Tawaf — Mengelilingi Ka'bah 7 Kali <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p><strong>Pengertian:</strong> Tawaf adalah mengelilingi Ka'bah sebanyak 7 kali putaran, dimulai dari Hajar Aswad dan berakhir di Hajar Aswad, dengan Ka'bah di sebelah kiri (berlawanan arah jarum jam).</p>
          <p style="margin-top:8px"><strong>Syarat tawaf:</strong> Suci dari hadats dan najis, menutup aurat, Ka'bah di sebelah kiri, dimulai dari Hajar Aswad, dan berjalan (kecuali tidak mampu).</p>
          <p style="margin-top:8px"><strong>Idhtiba:</strong> Menyampirkan kain ihram di bahu kanan (pria) saat tawaf.</p>
          <p style="margin-top:8px"><strong>Raml:</strong> Berjalan cepat dengan langkah kecil (pria) pada 3 putaran pertama.</p>
          <p style="margin-top:8px"><strong>Setelah tawaf:</strong> Shalat 2 rakaat di belakang Maqam Ibrahim (jika memungkinkan), kemudian minum air Zamzam.</p>
        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">3. Sa'i — Berjalan antara Shafa dan Marwah <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p><strong>Pengertian:</strong> Sa'i adalah berjalan antara bukit Shafa dan bukit Marwah sebanyak 7 perjalanan, mengikuti jejak Siti Hajar mencari air untuk Nabi Ismail AS.</p>
          <p style="margin-top:8px"><strong>Tata cara:</strong> Dimulai dari Shafa, berjalan ke Marwah (perjalanan ke-1), dari Marwah kembali ke Shafa (perjalanan ke-2), dan seterusnya hingga 7 perjalanan yang berakhir di Marwah.</p>
          <p style="margin-top:8px"><strong>Berlari kecil:</strong> Pria disunahkan berlari kecil antara dua tanda hijau (lampu hijau). Wanita tidak perlu berlari, cukup berjalan biasa.</p>
          <p style="margin-top:8px"><strong>Doa:</strong> Dianjurkan membaca doa dan dzikir sepanjang sa'i, terutama di Shafa dan Marwah.</p>
        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">4. Tahallul — Memotong Rambut <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p><strong>Pengertian:</strong> Tahallul adalah memotong rambut sebagai tanda selesainya ibadah umrah dan berakhirnya larangan ihram.</p>
          <p style="margin-top:8px"><strong>Pria:</strong> Disunahkan mencukur gundul (taqsir) karena lebih afdhal. Bisa juga hanya memotong sebagian rambut.</p>
          <p style="margin-top:8px"><strong>Wanita:</strong> Memotong ujung rambut sepanjang satu ruas jari (±2-3 cm) dari seluruh bagian rambut. Tidak boleh mencukur gundul.</p>
          <p style="margin-top:8px">Setelah tahallul, semua larangan ihram menjadi halal kembali. Anda bisa berganti pakaian, memakai wewangian, dan lain-lain.</p>
        </div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ Wajib Umrah</div>
      <p style="margin-bottom:12px">Wajib umrah jika ditinggalkan harus diganti dengan dam (denda), tetapi umrah tetap sah:</p>
      <ol style="margin-left:20px;color:var(--text2);font-size:0.9rem;line-height:2">
        <li><strong>Niat ihram di miqat</strong> — Tidak boleh melewati miqat tanpa niat ihram</li>
        <li><strong>Menjauhi larangan ihram</strong> — Tidak memotong kuku/rambut, tidak memakai wewangian, dll</li>
      </ol>
    </div>

    <div class="card">
      <div class="card-title">🌟 Sunnah Umrah</div>
      <ol style="margin-left:20px;color:var(--text2);font-size:0.9rem;line-height:2">
        <li>Mandi sebelum ihram</li>
        <li>Bersiwak</li>
        <li>Memakai wewangian sebelum memakai ihram</li>
        <li>Shalat 2 rakaat ihram</li>
        <li>Membaca talbiyah berulang-ulang</li>
        <li>Idhtiba (menyampirkan kain ihram di bahu kanan) saat tawaf</li>
        <li>Raml (berjalan cepat) pada 3 putaran pertama tawaf</li>
        <li>Berlari kecil antara dua tiang hijau saat sa'i</li>
        <li>Minum air Zamzam setelah tawaf</li>
        <li>Mencukur gundul untuk pria</li>
        <li>Tawaf wada (tawaf perpisahan) sebelum meninggalkan Makkah</li>
      </ol>
    </div>

    <div class="card" style="border-left:4px solid #dc3545">
      <div class="card-title" style="color:#dc3545">🚫 Larangan Ihram</div>
      <div class="grid-2" style="margin-top:12px">
        <div>
          <p style="font-weight:600;margin-bottom:4px;color:#dc3545">Larangan untuk Pria & Wanita:</p>
          <ol style="margin-left:16px;color:var(--text2);font-size:0.88rem;line-height:1.9">
            <li>Memotong rambut dan kuku</li>
            <li>Memakai wewangian/perfum</li>
            <li>Memburu atau membunuh hewan</li>
            <li>Melakukan akad nikah</li>
            <li>Bersetubuh</li>
            <li>Bertengkar atau berkata kotor</li>
          </ol>
        </div>
        <div>
          <p style="font-weight:600;margin-bottom:4px;color:#dc3545">Larangan Tambahan Pria:</p>
          <ol style="margin-left:16px;color:var(--text2);font-size:0.88rem;line-height:1.9">
            <li>Memakai pakaian berjahit</li>
            <li>Menutup kepala dengan topi/sorban</li>
            <li>Memakai alas kaki yang menutup tumit</li>
          </ol>
          <p style="font-weight:600;margin-top:8px;margin-bottom:4px;color:#dc3545">Larangan Tambahan Wanita:</p>
          <ol start="4" style="margin-left:16px;color:var(--text2);font-size:0.88rem;line-height:1.9">
            <li>Menutup wajah (niqab)</li>
            <li>Memakai sarung tangan</li>
          </ol>
        </div>
      </div>
    </div>
  </div>`;

  // MASJID NABAWI
  html+=`<div class="page" id="page-masjid-nabawi">

    <div class="highlight-box">

    <div class="accordion">
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Kubah Hijau (Al-Qubbah Al-Khadra) <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p>Kubah Hijau adalah kubah yang berada tepat di atas makam Rasulullah SAW. Kubah ini awalnya tidak berwarna hijau. Pada masa pemerintahan Sultan Qaitbay dari Mesir (abad ke-15), kubah ini dicat hijau dan warna tersebut dipertahankan hingga sekarang. Kubah ini menjadi penanda paling ikonik dari Masjid Nabawi dan bisa dilihat dari kejauhan.</p>
        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Mimbar Nabi <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">
          <p>Mimbar asli Rasulullah SAW terbuat dari batang pohon kurma dan memiliki 2 anak tangga. Mimbar saat ini adalah replika yang diperluas. Pada zaman Muawiyah RA, mimbar ditambah menjadi 6 anak tangga. Mimbar tempat Rasulullah SAW berkhutbah berada di sisi kiri Raudhah, dan shalat di antara mimbar dan makam memiliki keutamaan sangat besar.</p>
        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Makam Rasulullah SAW <span class="arrow">▼</span></div>
        <div class="accordion-body"><div class="accordion-body-inner">

        </div></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">Bagian-Bagian Masjid <span class="arrow">▼</span></div>

          <p><strong>Masjid Utama:</strong> Area shalat utama yang telah diperluas berkali-kali.</p>
          <p style="margin-top:4px"><strong>Raudhah:</strong> Taman dari surga, terletak antara rumah Rasulullah (makam) dan mimbar.</p>
          <p style="margin-top:4px"><strong>Halaman (Sahn):</strong> Area terbuka dengan payung-payung otomatis yang membuka saat panas dan menutup saat hujan.</p>
          <p style="margin-top:4px"><strong>Menara:</strong> 10 menara setinggi 105 meter di berbagai sudut masjid.</p>
          <p style="margin-top:4px"><strong>Pintu-Pintu:</strong> Lebih dari 80 pintu masuk, yang paling terkenal: Pintu Salam, Pintu Jibril, Pintu Nisa, dan Pintu Rahmah.</p>
        </div></div>
      </div>
    </div>
  </div>`;

  // RAUDHAH
  html+=`<div class="page" id="page-raudhah">
    <h1 class="section-title">Raudhah</h1>
    <p class="section-subtitle">Taman dari Surga — tempat mustajab untuk berdoa</p>
    
    <div class="highlight-box">
      <h3>🌿 Apa Itu Raudhah?</h3>
      <p>Rasulullah SAW bersabda: "Antara rumahku dan mimbarku adalah taman dari taman-taman surga." (HR. Bukhari & Muslim). Raudhah adalah area di dalam Masjid Nabawi yang membentang dari makam Rasulullah SAW hingga mimbar beliau. Luasnya sekitar 300 m² dan merupakan tempat yang sangat mustajab untuk berdoa.</p>
    </div>

    <div class="card">
      <div class="card-title">📋 Panduan Masuk Raudhah</div>
      <div class="accordion">
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">Cara Masuk <span class="arrow">▼</span></div>
          <div class="accordion-body"><div class="accordion-body-inner">
            <p>1. Datang 1-2 jam sebelum waktu shalat fardhu.</p>
            <p>2. Masuk melalui pintu khusus yang disediakan untuk laki-laki/perempuan.</p>
            <p>3. Tidak perlu berdesakan. Jika penuh, tunggu giliran dengan sabar.</p>
            <p>4. Wanita biasanya mendapat jadwal khusus (setelah Isya atau Subuh).</p>
            <p>5. Pastikan tidak mengganggu jamaah yang sedang shalat.</p>
          </div></div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">Reservasi (Eatumrah/Eatmarna) <span class="arrow">▼</span></div>
          <div class="accordion-body"><div class="accordion-body-inner">
            <p>Saat ini pemerintah Arab Saudi mewajibkan reservasi untuk mengunjungi Raudhah melalui aplikasi <strong>Eatmarna</strong> atau <strong>Tawakkalna</strong>. Langkah-langkah:</p>
            <p style="margin-top:8px">1. Unduh aplikasi Eatmarna dari App Store/Play Store.</p>
            <p>2. Daftar dengan data paspor dan informasi visa.</p>
            <p>3. Pilih slot waktu yang tersedia untuk Raudhah.</p>
            <p>4. Tunjukkan QR code reservasi saat masuk.</p>
            <p style="margin-top:8px"><em>Catatan: Banyak travel yang sudah menguruskan reservasi ini untuk jamaahnya.</em></p>
          </div></div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">Adab di Raudhah <span class="arrow">▼</span></div>
          <div class="accordion-body"><div class="accordion-body-inner">
            <p>1. Niatkan ibadah semata-mata karena Allah.</p>
            <p>2. Masuk dengan penuh kekhusyukan dan rasa hormat.</p>
            <p>3. Shalat 2 rakaat tahiyatul masjid.</p>
            <p>4. Berdoa dengan khusyuk, rendah hati, dan penuh harap.</p>
            <p>5. Jangan berteriak, menangis berlebihan, atau mengganggu jamaah lain.</p>
            <p>6. Jangan memotret jamaah lain tanpa izin.</p>
            <p>7. Keluar setelah selesai agar memberi kesempatan jamaah lain.</p>
            <p>8. Perbanyak shalawat kepada Rasulullah SAW.</p>
          </div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🕐 Simulasi Antrean Raudhah</div>
      <p style="color:var(--text2);margin-bottom:16px">Klik "Mulai Simulasi" untuk melihat estimasi waktu antrean</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Waktu Kunjungan</label>
          <select class="form-select" id="simWaktu">
            <option value="pagi">Pagi (Setelah Subuh)</option>
            <option value="siang">Siang (Sebelum Dzuhur)</option>
            <option value="sore" selected>Sore (Sebelum Maghrib)</option>
            <option value="malam">Malam (Setelah Isya)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Jenis Kelamin</label>
          <select class="form-select" id="simGender">
            <option value="pria">Pria</option>
            <option value="wanita">Wanita</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="simulasiAntrean()">Mulai Simulasi</button>
      <div id="simResult" style="margin-top:16px;display:none" class="calc-result">
        <div style="font-size:0.85rem;opacity:0.8;margin-bottom:8px">Estimasi Waktu Antrean</div>
        <div class="calc-value" id="simTimeValue">0</div>
        <div class="calc-unit" id="simTimeUnit">menit</div>
        <p style="margin-top:8px;font-size:0.85rem;opacity:0.9" id="simTip"></p>
      </div>
    </div>
  </div>`;

  // MIQAT

    <div class="highlight-box">

      <p>Miqat adalah batas wilayah yang ditetapkan oleh Rasulullah SAW, di mana jamaah yang melewatinya wajib berihram (berniat) untuk haji atau umrah. Melewati miqat tanpa ihram wajib membayar dam (denda). Terdapat 5 miqat utama untuk jamaah dari berbagai arah penjuru dunia.</p>

  // MAKKAH
  html+=`<div class="page" id="page-makkah">
    <h1 class="section-title">Kota Makkah</h1>
    <p class="section-subtitle">Pusat ibadah umat Islam, kota suci pertama dalam Islam</p>
    
    <div class="highlight-box">
      <h3>🕌 Tentang Makkah</h3>
      <p>Makkah Al-Mukarramah adalah kota paling suci dalam agama Islam dan merupakan kiblat seluruh umat Islam di dunia. Di kota inilah Ka'bah berada, bangunan pertama yang dibangun untuk beribadah kepada Allah SWT. Setiap tahun, jutaan jamaah haji dan umrah berdatangan ke Makkah untuk menunaikan ibadah.</p>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">📜 Sejarah</div>
        <p>Makkah memiliki sejarah panjang yang bermula dari zaman Nabi Ibrahim AS dan Nabi Ismail AS yang membangun Ka'bah atas perintah Allah. Kota ini dulunya bernama Bakkah. Nabi Muhammad SAW lahir di Makkah pada tahun 570 M dan menerima wahyu pertama di Gua Hira (Jabal Nur). Meski awalnya ditentang oleh penduduk Makkah, Islam akhirnya kembali menguasai kota ini secara damai pada tahun 8 H (630 M).</p>
      </div>
      <div class="card">
        <div class="card-title">🌟 Keutamaan</div>
        <p>Makkah adalah tanah suci yang Allah SWT kehendaki sebagai pusat ibadah. Shalat di Masjidil Haram bernilai 100.000 kali lipat dibanding shalat di masjid biasa. Allah berfirman: "Sesungguhnya orang-orang yang kafir dan menghalangi (manusia) dari jalan Allah dan dari Masjidil Haram yang telah Kami jadikan untuk semua manusia." (QS. Al-Hajj: 25)</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">👥 Kondisi Saat Musim Ramai</div>
      <p style="margin-bottom:12px">Makkah bisa sangat ramai, terutama pada bulan Ramadhan dan musim haji. Berikut yang perlu Anda ketahui:</p>
      <div class="grid-3">
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Jamaah</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Musim haji: 2-3 juta orang. Ramadhan: 1-2 juta. Bulan biasa: 500.000-1 juta.</p>
        </div>
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Suhu</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Musim panas bisa mencapai 45-50°C. Musim dingin 15-25°C. Masjid bersistem AC.</p>
        </div>
        <div style="padding:12px;background:var(--bg2);border-radius:var(--radius-sm)">
          <strong style="color:var(--accent)">Tips</strong>
          <p style="font-size:0.85rem;color:var(--text2);margin-top:4px">Hindari jam sibuk untuk tawaf (setelah shalat fardhu). Berjalan pelan, jangan mendorong. Selalu bawa air minum.</p>
        </div>
      </div>
    </div>
  </div>`;

          <p>Ka'bah adalah bangunan kubus yang terletak di tengah Masjidil Haram. Dibangun pertama kali oleh Nabi Ibrahim AS dan Nabi Ismail AS sebagai tempat ibadah kepada Allah. Ka'bah diliputi kain hitam (Kiswah) yang diganti setiap tahun pada hari Arafah. Tinggi Ka'bah sekitar 15 meter, panjang sisi 10,5-11,5 meter. Ka'bah bukan objek penyembahan — umat Islam menghadap Ka'bah karena perintah Allah sebagai simbol persatuan.</p>

// Tab switching
function switchTab(section,tab){
  document.querySelectorAll(`#page-${section==='perlengkapan'?'perlengkapan':'persiapan'} .tab`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`#page-${section==='perlengkapan'?'perlengkapan':'persiapan'} .tab-content`).forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  const tabEl=document.getElementById(`tab-${section}-${tab}`);
  if(tabEl)tabEl.classList.add('active');
  // Perlengkapan tab
  if(section==='perlengkapan')renderPerlengkapan(tab);
}

// Accordion
function toggleAccordion(el){
  const isOpen=el.classList.contains('open');
  // Close all in same accordion
  el.closest('.accordion').querySelectorAll('.accordion-header').forEach(h=>{
    h.classList.remove('open');
    h.nextElementSibling.style.maxHeight='0';
  });
  if(!isOpen){
    el.classList.add('open');
    const body=el.nextElementSibling;
    body.style.maxHeight=body.scrollHeight+'px';
  }
}

        <td><button class="status-btn ${st?'done':'pending'}" onclick="toggleDokumen(${i})">${st?'✓ Sudah':'✗ Belum'}</button></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
function toggleDokumen(idx){
  state.dokumenStatus[idx].status=!state.dokumenStatus[idx].status;
  saveState();
  renderDokumen();
  showToast(state.dokumenStatus[idx].status?'Dokumen ditandai selesai':'Dokumen ditandai belum');
}
function setAllDokumen(val){
  state.dokumenStatus.forEach(d=>d.status=val);
  saveState();
  renderDokumen();
  showToast(val?'Semua dokumen ditandai selesai':'Semua dokumen direset');
}

// Kalkulator Air
function calcWater(){
  const w=parseFloat(document.getElementById('calcWeight').value);
  const a=parseFloat(document.getElementById('calcActivity').value);
  if(!w||w<20)return;
  const ml=Math.round(w*35*a);
  document.getElementById('calcResult').style.display='block';
  document.getElementById('calcWaterValue').textContent=ml.toLocaleString('id-ID');
  document.getElementById('calcGlassValue').textContent=Math.round(ml/250);
}

// Perlengkapan
function renderPerlengkapan(cat){
  if(!cat)cat='Pria';
  const data=PERLENGKAPAN_DATA.find(d=>d.cat===cat);
  if(!data)return;
  const wrap=document.getElementById('perlengkapanContent');
  wrap.innerHTML=`<div class="card">
    <div style="margin-top:8px">${data.items.map((item,i)=>{
      const key=cat+'_'+i;
      const checked=state.perlengkapanCheck.includes(key);
      return `<div class="checklist-item ${checked?'checked':''}">
        <input type="checkbox" ${checked?'checked':''} onchange="togglePerlengkapan('${key}',this)">
        <span class="cl-text">${item}</span>
        <span class="cl-cat">${cat}</span>
      </div>`;
    }).join('')}</div>
  </div>`;
  updatePerlengkapanProgress();
}
function togglePerlengkapan(key,el){
  if(el.checked){
    if(!state.perlengkapanCheck.includes(key))state.perlengkapanCheck.push(key);
  }else{
    state.perlengkapanCheck=state.perlengkapanCheck.filter(k=>k!==key);
  }
  saveState();
  el.closest('.checklist-item').classList.toggle('checked',el.checked);
  updatePerlengkapanProgress();
}
function updatePerlengkapanProgress(){
  const total=PERLENGKAPAN_DATA.reduce((s,d)=>s+d.items.length,0);
  const pct=Math.round((state.perlengkapanCheck.length/total)*100);
  const bar=document.getElementById('perlengkapanBar');
  const pctEl=document.getElementById('perlengkapanPct');
  if(bar)bar.style.width=pct+'%';
  if(pctEl)pctEl.textContent=pct+'%';
}
